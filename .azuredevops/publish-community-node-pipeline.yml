# Auto-generated by fork-community-nodes.sh
# Publishes this package to GitHub Packages (@taxmanagementnz scope) on push to main.
# Package manager: npm
# To override: set pipeline variable PACKAGE_MANAGER = npm | pnpm

trigger:
  branches:
    include:
      - main

variables:
  PACKAGE_MANAGER: npm

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    displayName: 'Checkout repository'

  - task: NodeTool@0
    displayName: 'Set up Node.js'
    inputs:
      versionSpec: '20.x'

  - task: Bash@3
    displayName: 'Install dependencies'
    inputs:
      targetType: inline
      script: |
        set -euo pipefail
        if [ "$(PACKAGE_MANAGER)" = "pnpm" ]; then
          npm install -g pnpm
          pnpm install --frozen-lockfile
        else
          npm ci
        fi

  - task: Bash@3
    displayName: 'Build'
    inputs:
      targetType: inline
      script: |
        set -euo pipefail
        if [ "$(PACKAGE_MANAGER)" = "pnpm" ]; then
          pnpm run build
        else
          npm run build
        fi
        echo "Build complete. dist/ contents:"
        ls dist/

  - task: Bash@3
    displayName: 'Verify package name is scoped to @taxmanagementnz'
    inputs:
      targetType: inline
      script: |
        set -euo pipefail
        PKG_NAME=$(jq -r '.name' package.json)
        if [[ "$PKG_NAME" != @taxmanagementnz/* ]]; then
          echo "##vso[task.logissue type=error]package.json name '$PKG_NAME' must start with @taxmanagementnz/ — update it before publishing."
          exit 1
        fi
        echo "Package name: $PKG_NAME — OK"

  - task: Npm@1
    displayName: 'Publish to GitHub Packages'
    inputs:
      command: publish
      publishRegistry: useExternalRegistry
      publishEndpoint: tmnz-github-packages-publish
      workingDir: '.'
