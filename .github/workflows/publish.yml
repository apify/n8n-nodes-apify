name: Release & Publish Apify n8n Node

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js & cache npm
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm run test

      - name: Extract release version
        id: get_version
        run: |
          FULL_TAG_NAME="${{ github.event.release.tag_name }}"
          VERSION_NUMBER="${FULL_TAG_NAME#v}"
          echo "VERSION=${VERSION_NUMBER}" >> $GITHUB_ENV

      - name: Update package.json version
        run: |
          echo "Updating package.json to version ${{ env.VERSION }}"
          npm version ${{ env.VERSION }} --no-git-tag-version

      - name: Stage version update
        id: stage
        run: |
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No changes to commit in package.json or package-lock.json for version update."
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit version update
        if: steps.stage.outputs.has-changes == 'true'
        uses: apify/workflows/commit@v0.44.0
        with:
          commit-message: "chore(release): set version to ${{ env.VERSION }} [skip ci]"
          github-token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
          branch: ${{ github.event.release.target_commitish }}

      - name: Publish to npm
        run: |
          if npm view @apify/n8n-nodes-apify@${{ env.VERSION }} version > /dev/null 2>&1; then
            echo "Version ${{ env.VERSION }} of @apify/n8n-nodes-apify is already published to npm. Skipping publish step."
          else
            echo "Publishing @apify/n8n-nodes-apify@${{ env.VERSION }} to npm..."
            npm publish --provenance --access public
          fi
