name: Sync upstream
on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9am UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Sync upstream changes to branch
        uses: repo-sync/github-sync@3832fe8e2be32372e1b3970bbae8e7079edeec88  # v2.3.0
        with:
          source_repo: apify/n8n-nodes-apify
          source_branch: master
          destination_branch: upstream-sync
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Open PR if upstream-sync differs from master
        uses: repo-sync/pull-request@7e79a9f5dc3ad0ce53138f01df2fad14a04831c5  # v2.12.1
        with:
          source_branch: upstream-sync
          destination_branch: master
          pr_title: "chore: sync upstream changes from apify/n8n-nodes-apify"
          pr_body: |
            Automated upstream sync PR.

            Before merging:
            - Review the upstream diff for any breaking changes or security concerns
            - Bump the version in `package.json` (the publish pipeline will fail if the version already exists in GitHub Packages)
            - Update `community-nodes.json` in `TaxManager.N8N` to the new version after this PR merges
          github_token: ${{ secrets.GITHUB_TOKEN }}
